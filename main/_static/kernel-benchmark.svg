<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title description">
<title id="title">Isolated raster kernel latency on RTX 5090</title>
<desc id="description">Horizontal bars compare gsplat 1.5.3 reference and ptxsplat SM120 median latency for isolated forward and backward raster stages. Lower latency is better.</desc>
